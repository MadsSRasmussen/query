name: Publish

on:
    release:
        types: [published]

concurrency:
    group: publish-${{ github.event.release.tag_name }}
    cancel-in-progress: false

jobs:
    prepare-publish:
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.event.release.target_commitish }}

            - name: Setup deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Validate release tag
              run: bash scripts/validate_release_tag.sh

            - name: Bump package versions
              run: deno run --allow-env --allow-read --allow-write scripts/bump_version.ts

            - name: Commit and push bumped versions
              env:
                  TARGET_BRANCH: ${{ github.event.release.target_commitish }}
                  RELEASE_TAG: ${{ github.ref_name }}
              run: bash scripts/commit_bumped_versions.sh

    publish-packages:
        runs-on: ubuntu-latest
        needs: prepare-publish

        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.release.target_commitish }}

            - name: Setup deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Publish packages to JSR in configured order
              run: bash scripts/publish_packages.sh
