name: Integration Tests

on:
    workflow_dispatch:

jobs:
    integration-tests:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Verify Docker availability
              run: |
                  docker version
                  docker info

            - name: Run integration tests
              run: deno task test:integration
